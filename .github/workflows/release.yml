name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

# One release at a time — tags are sequential so no cancel-in-progress needed
concurrency:
  group: release

jobs:
  # ── Run tests in parallel for both Scala versions ─────────────────────────
  test:
    name: Test (Scala ${{ matrix.scala }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        scala: ["2.13.15", "2.12.20"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # dynver needs full tag history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        env:
          JAVA_OPTS: >-
            --add-opens=java.base/javax.security.auth=ALL-UNNAMED
            --add-opens=java.base/java.lang=ALL-UNNAMED
            --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
            --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
            --add-opens=java.base/java.io=ALL-UNNAMED
            --add-opens=java.base/java.net=ALL-UNNAMED
            --add-opens=java.base/java.nio=ALL-UNNAMED
            --add-opens=java.base/java.util=ALL-UNNAMED
            --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
            --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED
            --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
            --add-opens=java.base/sun.nio.cs=ALL-UNNAMED
            --add-opens=java.base/sun.security.action=ALL-UNNAMED
            --add-opens=java.base/sun.util.calendar=ALL-UNNAMED
            --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED
        run: sbt ++${{ matrix.scala }} test

  # ── Publish to Maven Central + create GitHub Release ──────────────────────
  publish:
    name: Publish & Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # dynver needs full tag history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Import GPG signing key
        run: echo "$PGP_SECRET" | base64 --decode | gpg --import --batch
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}

      # +publishSigned cross-publishes all 3 artifacts (core, listener, testing)
      # for both Scala versions (6 JARs + sources + javadoc + signatures).
      # sonatypeUploadBundle uploads to the new Central Portal without touching
      # the legacy OSSRH staging API (sonatypeBundleRelease calls
      # stagingRepositoryProfiles which returns 402 on central.sonatype.com).
      # sonatypeBundleRelease = signs + bundles + uploads via sbt-sonatype's own
      # HTTP client (which the Central Portal accepts). Uploads as USER_MANAGED.
      - name: Publish signed artifacts and upload bundle
        run: sbt "+publishSigned" "sonatypeBundleRelease"
        env:
          PGP_PASSPHRASE:    ${{ secrets.PGP_PASSPHRASE }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      # sonatypeBundleRelease uploads with USER_MANAGED (hardcoded in sbt-sonatype 3.12.x).
      # Use the Central Portal API to find the PENDING deployment and promote it.
      - name: Promote deployment to PUBLISHED
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          TOKEN=$(printf '%s:%s' "$SONATYPE_USERNAME" "$SONATYPE_PASSWORD" | base64 -w 0)

          echo "Fetching pending deployments..."
          BODY=$(curl -sf \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "https://central.sonatype.com/api/v1/publisher/deployments?namespace=io.github.nidhal-saadaoui&maxResults=5&state=PENDING")
          echo "Response: $BODY"

          DEPLOYMENT_ID=$(echo "$BODY" | jq -r '.deployments[0].deploymentId // empty')
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "ERROR: no PENDING deployment found"
            exit 1
          fi

          echo "Publishing deployment: $DEPLOYMENT_ID"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://central.sonatype.com/api/v1/publisher/deployment/$DEPLOYMENT_ID")
          echo "Publish HTTP status: $HTTP"
          [ "$HTTP" -lt 300 ] || exit 1

      # Assembly is only configured on the listener subproject.
      # Build both Scala versions for the GitHub release attachments.
      - name: Build assembly JARs
        run: sbt "+listener/assembly"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "spark-lens ${{ github.ref_name }}" \
            --generate-notes \
            listener/target/scala-2.12/spark-lens_2.12-*-assembly.jar \
            listener/target/scala-2.13/spark-lens_2.13-*-assembly.jar
