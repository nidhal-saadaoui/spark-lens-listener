name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

# One release at a time — tags are sequential so no cancel-in-progress needed
concurrency:
  group: release

jobs:
  # ── Run tests in parallel for both Scala versions ─────────────────────────
  test:
    name: Test (Scala ${{ matrix.scala }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        scala: ["2.13.15", "2.12.20"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # dynver needs full tag history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        env:
          JAVA_OPTS: >-
            --add-opens=java.base/javax.security.auth=ALL-UNNAMED
            --add-opens=java.base/java.lang=ALL-UNNAMED
            --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
            --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
            --add-opens=java.base/java.io=ALL-UNNAMED
            --add-opens=java.base/java.net=ALL-UNNAMED
            --add-opens=java.base/java.nio=ALL-UNNAMED
            --add-opens=java.base/java.util=ALL-UNNAMED
            --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
            --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED
            --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
            --add-opens=java.base/sun.nio.cs=ALL-UNNAMED
            --add-opens=java.base/sun.security.action=ALL-UNNAMED
            --add-opens=java.base/sun.util.calendar=ALL-UNNAMED
            --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED
        run: sbt ++${{ matrix.scala }} test

  # ── Publish to Maven Central + create GitHub Release ──────────────────────
  publish:
    name: Publish & Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # dynver needs full tag history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Import GPG signing key
        run: echo "$PGP_SECRET" | base64 --decode | gpg --import --batch
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}

      # +publishSigned cross-publishes all 3 artifacts (core, listener, testing)
      # for both Scala versions (6 JARs + sources + javadoc + signatures).
      # sonatypeUploadBundle uploads to the new Central Portal without touching
      # the legacy OSSRH staging API (sonatypeBundleRelease calls
      # stagingRepositoryProfiles which returns 402 on central.sonatype.com).
      # +publishSigned writes signed JARs/POMs/sources/javadoc into
      # target/sonatype-staging/ (Maven layout). It does NOT create bundle.zip.
      - name: Publish signed artifacts
        run: sbt "+publishSigned"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}

      # Zip the staged artifacts ourselves, then upload with publishingType=AUTOMATIC
      # so Sonatype Central promotes immediately without manual portal action.
      # sbt-sonatype 3.12.x hardcodes USER_MANAGED so we bypass it entirely.
      - name: Bundle and upload to Sonatype Central (auto-publish)
        run: |
          STAGING="target/sonatype-staging"
          echo "Staging directory contents:"
          ls -la "$STAGING" || { echo "ERROR: staging dir missing — publishSigned may have failed"; exit 1; }

          # sbt-sonatype writes artifacts under a version-named subdirectory:
          #   target/sonatype-staging/1.6.1/io/github/nidhal-saadaoui/...
          # The bundle.zip root must start with io/github/... NOT 1.6.1/io/github/...
          # so we zip from inside the version subdirectory.
          VERSION_SUBDIR=$(ls "$STAGING" | head -1)
          echo "Zipping from: $STAGING/$VERSION_SUBDIR"
          (cd "$STAGING/$VERSION_SUBDIR" && zip -r ../bundle.zip .)
          echo "Bundle size: $(du -sh $STAGING/bundle.zip | cut -f1)"

          # Sonatype Central API uses Bearer token auth, not HTTP Basic.
          # The token is base64(username:password) of the portal user token credentials.
          TOKEN=$(printf '%s:%s' "$SONATYPE_USERNAME" "$SONATYPE_PASSWORD" | base64 -w 0)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -F "bundle=@${STAGING}/bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=${{ github.ref_name }}&publishingType=AUTOMATIC")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Deployment ID : $BODY"
          echo "HTTP status   : $HTTP_CODE"
          [ "$HTTP_CODE" -lt 300 ] || exit 1
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      # Assembly is only configured on the listener subproject.
      # Build both Scala versions for the GitHub release attachments.
      - name: Build assembly JARs
        run: sbt "+listener/assembly"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "spark-lens ${{ github.ref_name }}" \
            --generate-notes \
            listener/target/scala-2.12/spark-lens_2.12-*-assembly.jar \
            listener/target/scala-2.13/spark-lens_2.13-*-assembly.jar
