name: Docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_call:  # allows release.yml to trigger this after a tag publish

# Cancel any in-progress docs run for the same branch
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    name: Scaladoc + Landing Page → GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # dynver needs full tag history for version string

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Generate Scaladoc (Scala 2.13)
        env:
          JAVA_OPTS: >-
            --add-opens=java.base/java.lang=ALL-UNNAMED
            --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
        run: sbt "++2.13.15 doc"

      # Combine landing page (docs/) and Scaladoc (target/scala-2.13/api/)
      # into one _site/ directory so both are served from the same gh-pages branch:
      #   https://nidhal-saadaoui.github.io/spark-lens-listener/        ← landing page
      #   https://nidhal-saadaoui.github.io/spark-lens-listener/api/    ← Scaladoc
      - name: Stage site
        run: |
          mkdir -p _site/api
          cp -r docs/* _site/
          cp -r target/scala-2.13/api/* _site/api/

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: publish landing page + Scaladoc"
