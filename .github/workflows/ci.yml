name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel outdated runs on the same PR or branch — keeps the queue clean
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit tests — both Scala versions × both Java versions ─────────────────
  test:
    name: Test (Scala ${{ matrix.scala }}, Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scala: ["2.13.15", "2.12.20"]
        java: ["11", "17"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # dynver needs full tag history

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        env:
          JAVA_OPTS: >-
            --add-opens=java.base/javax.security.auth=ALL-UNNAMED
            --add-opens=java.base/java.lang=ALL-UNNAMED
            --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
            --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
            --add-opens=java.base/java.io=ALL-UNNAMED
            --add-opens=java.base/java.net=ALL-UNNAMED
            --add-opens=java.base/java.nio=ALL-UNNAMED
            --add-opens=java.base/java.util=ALL-UNNAMED
            --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
            --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED
            --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
            --add-opens=java.base/sun.nio.cs=ALL-UNNAMED
            --add-opens=java.base/sun.security.action=ALL-UNNAMED
            --add-opens=java.base/sun.util.calendar=ALL-UNNAMED
            --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED
        run: sbt ++${{ matrix.scala }} test

  # ── Build fat JAR (Scala 2.12 — matches default Spark binary version) ─────
  assembly:
    name: Assembly JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Build fat JAR
        run: sbt "++2.12.20 assembly"

      - name: Upload assembly JAR
        uses: actions/upload-artifact@v4
        with:
          name: spark-lens-assembly
          path: target/scala-2.12/spark-lens_2.12-*-assembly.jar
          retention-days: 7

  # ── End-to-end integration test: demo job via PySpark ─────────────────────
  integration-test:
    name: Integration Test (Spark ${{ matrix.spark_version }})
    runs-on: ubuntu-latest
    needs: assembly

    strategy:
      fail-fast: false
      matrix:
        include:
          - spark_version: "3.5.5"
            java_version: "17"
            python_version: "3.11"
          - spark_version: "3.2.3"
            java_version: "11"
            python_version: "3.9"  # PySpark 3.2.x bundles cloudpickle 1.x which predates Python 3.11 bytecode

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: temurin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install PySpark
        run: pip install pyspark==${{ matrix.spark_version }}

      - name: Download assembly JAR
        uses: actions/download-artifact@v4
        with:
          name: spark-lens-assembly
          path: target/scala-2.12/

      - name: Run demo job
        run: |
          SPARK_HOME=$(python -c "import pyspark; print(pyspark.__path__[0])")
          JAR=$(ls target/scala-2.12/spark-lens_2.12-*-assembly.jar | head -1)
          ${SPARK_HOME}/bin/spark-submit \
            --master "local[2]" \
            --driver-class-path "${JAR}" \
            --conf spark.extraListeners=com.github.saadaouini.sparklens.SparkLensListener \
            --conf spark.sparklens.output=text \
            --conf spark.sparklens.report.path=/tmp/spark-lens-report.txt \
            --conf spark.sql.adaptive.enabled=false \
            --conf spark.sparklens.cache.sql.minExecCount=3 \
            integration-test/demo_job.py

      - name: Verify report content
        run: |
          cat /tmp/spark-lens-report.txt
          # ── Original 8 scenarios (jobs 1–8) ───────────────────────────────
          grep -q "Health:"                              /tmp/spark-lens-report.txt
          grep -q "Repeated Scan"                        /tmp/spark-lens-report.txt
          grep -q "Excessive Shuffles"                   /tmp/spark-lens-report.txt
          grep -q "Window Function Without PARTITION BY" /tmp/spark-lens-report.txt
          grep -q "Cartesian Product"                    /tmp/spark-lens-report.txt
          grep -q "Broadcast Join Disabled"              /tmp/spark-lens-report.txt
          grep -q "Skew"                                 /tmp/spark-lens-report.txt
          grep -q "Java Serializer"                      /tmp/spark-lens-report.txt
          grep -q "Adaptive Query Execution"             /tmp/spark-lens-report.txt
          grep -q "Driver-Side Aggregation"              /tmp/spark-lens-report.txt
          grep -q "Consider Native Functions"            /tmp/spark-lens-report.txt
          # ── New scenarios (jobs 9–12) ──────────────────────────────────────
          grep -q "Single-Task Stage"                    /tmp/spark-lens-report.txt
          grep -q "Small Output Files"                   /tmp/spark-lens-report.txt
          grep -q "Small Files in Stage"                 /tmp/spark-lens-report.txt
          echo "All 14 expected issues detected in report."

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spark-lens-report-${{ matrix.spark_version }}
          path: /tmp/spark-lens-report.txt
          retention-days: 7
